<!DOCTYPE html>
<html>
<head>
    <title> To-Do App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">📝  To-Do App</h2>

        <!-- Add Task -->
        <form action="/add" method="POST" class="row g-2 mb-3">
            <div class="col-md-4">
                <input type="text" name="task" class="form-control" placeholder="Enter task">
            </div>
            <div class="col-md-3">
                <select name="priority" class="form-control">
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                </select>
            </div>
            <div class="col-md-3">
                <select name="category" class="form-control">
                    <option>Work</option>
                    <option>Personal</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100">Add</button>
            </div>
        </form>

        <!-- Task List -->
        <ul class="list-group">
            {% for task in tasks %}
            <li class="list-group-item">

                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <strong class="{% if task.done %}text-decoration-line-through{% endif %}">
                            {{ task.text }}
                        </strong>
                        <br>
                        <small class="text-muted">
                            {{ task.category }} | Priority: {{ task.priority }}
                        </small>
                    </div>

                    <div>
                        <a href="/complete/{{ loop.index0 }}" class="btn btn-success btn-sm">✔</a>
                        <a href="/delete/{{ loop.index0 }}" class="btn btn-danger btn-sm">🗑</a>
                    </div>
                </div>

                <!-- Edit Form -->
                <form action="/edit/{{ loop.index0 }}" method="POST" class="mt-2 d-flex">
                    <input type="text" name="new_task" class="form-control me-2" placeholder="Edit task">
                    <button class="btn btn-warning btn-sm">Update</button>
                </form>

            </li>
            {% endfor %}
        </ul>

    </div>
</div>

</body>
</html>
